<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox Maze Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Fox Maze</h1>
        <canvas id="game"></canvas>
        
        <div class="controls">
            <div class="row">
                <button class="btn" onclick="move(0,-1)">UP</button>
            </div>
            <div class="row">
                <button class="btn" onclick="move(-1,0)">LEFT</button>
                <button class="btn" onclick="move(0,1)">DOWN</button>
                <button class="btn" onclick="move(1,0)">RIGHT</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
